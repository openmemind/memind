# Local development defaults:
# - SQLite is used by default and can be overridden through MEMIND_DATASOURCE_* env vars.
# - The fallback vector store is a local JSON file.
# - Spring AI provider defaults are configured under spring.ai.
# - Memind AI client routing is configured under memind.ai.
# - Optional rerank provider settings are read from MEMIND_RERANK_* env vars.
# - To switch to MySQL or Qdrant, replace/merge the commented examples at the bottom of this file.

spring:
  application:
    name: memind-server
  datasource:
    url: ${MEMIND_DATASOURCE_URL:jdbc:sqlite:./data/memind-server.db?journal_mode=WAL}
    driver-class-name: ${MEMIND_DATASOURCE_DRIVER_CLASS_NAME:org.sqlite.JDBC}
    username: ${MEMIND_DATASOURCE_USERNAME:}
    password: ${MEMIND_DATASOURCE_PASSWORD:}
    hikari:
      maximum-pool-size: ${MEMIND_DATASOURCE_MAX_POOL_SIZE:10}
      minimum-idle: ${MEMIND_DATASOURCE_MIN_IDLE:1}
      connection-test-query: ${MEMIND_DATASOURCE_CONNECTION_TEST_QUERY:SELECT 1}
      connection-timeout: 5000
      leak-detection-threshold: 2000
  jackson:
    default-property-inclusion: non_null
  ai:
    model:
      chat: openai
      embedding: openai
    openai:
      base-url: ${OPENAI_BASE_URL:https://openrouter.ai/api}
      api-key: ${OPENAI_API_KEY:your-api-key}
      chat:
        options:
          model: ${OPENAI_CHAT_MODEL:openai/gpt-4o-mini}
          temperature: ${OPENAI_CHAT_TEMPERATURE:0.2}
      embedding:
        base-url: ${EMBEDDING_BASE_URL:${OPENAI_BASE_URL:https://openrouter.ai/api}}
        api-key: ${EMBEDDING_API_KEY:${OPENAI_API_KEY:your-api-key}}
        options:
          model: ${OPENAI_EMBEDDING_MODEL:openai/text-embedding-3-small}
    # Keeps external Spring AI vector stores dormant by default.
    # Switch this to qdrant in the commented example below when enabling Qdrant.
    vectorstore:
      type: simple

    mcp:
      server:
        enabled: ${MEMIND_MCP_ENABLED:true}
        name: memind-mcp-server
        version: ${MEMIND_MCP_SERVER_VERSION:0.2.0-SNAPSHOT}
        type: SYNC
        protocol: STATELESS
        request-timeout: ${MEMIND_MCP_REQUEST_TIMEOUT:30s}
        instructions: "Memind memory tools for AI agents."
        tool-callback-converter: false
        annotation-scanner:
          enabled: true
        capabilities:
          tool: true
          resource: false
          prompt: false
          completion: false

server:
  port: ${SERVER_PORT:8366}

memind:
  ai:
    chat:
      # Spring AI ChatClient or ChatModel bean name used by default.
      default: openAiChatModel
      # Optional slot routing. Unconfigured slots use default.
      # slots:
      #   INSIGHT_GENERATOR: openAiChatModel
    embedding:
      # Spring AI EmbeddingModel bean name.
      default: openAiEmbeddingModel
  mcp:
    governance-enabled: ${MEMIND_MCP_GOVERNANCE_ENABLED:false}
    default-token-budget: ${MEMIND_MCP_DEFAULT_TOKEN_BUDGET:1800}
    max-token-budget: ${MEMIND_MCP_MAX_TOKEN_BUDGET:6000}
    max-items-per-context: ${MEMIND_MCP_MAX_ITEMS_PER_CONTEXT:50}
    max-result-limit: ${MEMIND_MCP_MAX_RESULT_LIMIT:100}
    max-ids-per-request: ${MEMIND_MCP_MAX_IDS_PER_REQUEST:50}
    max-raw-segment-chars: ${MEMIND_MCP_MAX_RAW_SEGMENT_CHARS:12000}
  vector:
    # Used only by the fallback local file vector store.
    # When an external VectorStore bean such as Qdrant is configured, this path is ignored.
    store-path: ${MEMIND_VECTOR_STORE_PATH:./data/vector-store.json}
  rerank:
    # Optional reranker. When base-url and api-key are set, memind-server creates an
    # LlmReranker bean and calls <base-url>/v1/rerank during deep retrieval.
    # Leave base-url/api-key empty to keep the default NoopReranker behavior.
    base-url: ${MEMIND_RERANK_BASE_URL:https://aihubmix.com}
    api-key: ${MEMIND_RERANK_API_KEY:}
    model: ${MEMIND_RERANK_MODEL:jina-reranker-v3}
  store:
    init-schema: ${MEMIND_STORE_INIT_SCHEMA:true}

logging:
  level:
    root: ${ROOT_LOG_LEVEL:INFO}
    com.openmemind.ai.memory: ${MEMIND_LOG_LEVEL:INFO}
    com.baomidou.mybatisplus: WARN
    org.springframework.ai.retry: WARN

# Example: replace the spring.datasource block above when switching to MySQL.
# spring:
#   datasource:
#     url: jdbc:mysql://127.0.0.1:3306/memind?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8
#     driver-class-name: com.mysql.cj.jdbc.Driver
#     username: memind
#     password: changeit
#     hikari:
#       maximum-pool-size: 10
#       minimum-idle: 2
#       connection-test-query: SELECT 1
#
# Example: merge this block under spring.ai when switching the vector store to Qdrant.
# The Qdrant starter dependency is already on the classpath.
# Once type=qdrant is enabled, memind's fallback file vector store backs off automatically.
# spring:
#   ai:
#     vectorstore:
#       type: qdrant
#       qdrant:
#         host: 127.0.0.1
#         port: 6334
#         use-tls: false
#         api-key:
#         collection-name: memind
#         content-field-name: doc_content
#         initialize-schema: true
#
# Example: replace the spring.datasource block above when switching to PostgreSQL.
# spring:
#   datasource:
#     url: jdbc:postgresql://127.0.0.1:5432/memind
#     driver-class-name: org.postgresql.Driver
#     username: memind
#     password: changeit
