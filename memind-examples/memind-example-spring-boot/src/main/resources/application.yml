spring:
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      embedding:
        options:
          model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
      chat:
        options:
          model: ${OPENAI_CHAT_MODEL:gpt-4o-mini}
  main:
    web-application-type: none

memind:
  vector:
    store-path: ./target/example-runtime/default/vector-store.json
  extraction:
    timeout: 5m
    chunking:
      strategy: FIXED_SIZE
      messages-per-chunk: 10
    insight-build:
      grouping-threshold: 3
      build-threshold: 2
  retrieval:
    rerank:
      enabled: false
