name: Python Client

on:
  push:
    branches:
      - main
    paths:
      - 'memind-clients/python/**'
      - '.github/workflows/python-client.yml'
      - '.github/workflows/release-python-client.yml'
  pull_request:
    paths:
      - 'memind-clients/python/**'
      - '.github/workflows/python-client.yml'
      - '.github/workflows/release-python-client.yml'

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: memind-clients/python/pyproject.toml

      - name: Install
        working-directory: memind-clients/python
        run: pip install -e ".[dev]"

      - name: Ruff format
        working-directory: memind-clients/python
        run: ruff format --check .

      - name: Ruff check
        working-directory: memind-clients/python
        run: ruff check .

      - name: Mypy
        working-directory: memind-clients/python
        run: mypy src

      - name: Pytest
        working-directory: memind-clients/python
        run: pytest --cov=memind --cov-fail-under=90 -q
