name: Release TypeScript Client

# Release prerequisites:
# - The `@openmemind/memind` package must exist on npm or be publishable by OpenMemind maintainers.
# - npm Trusted Publishing must trust this workflow path and the `npm` environment.
# - The GitHub repository must define an environment named `npm`.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (must match package.json)'
        required: true
        type: string

jobs:
  release:
    name: Build and publish TypeScript client
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
          cache-dependency-path: memind-clients/typescript/pnpm-lock.yaml

      - name: Validate version input
        working-directory: memind-clients/typescript
        shell: bash
        run: |
          if [ -z "${{ inputs.version }}" ]; then
            echo "Error: version input is required"
            exit 1
          fi
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$PKG_VERSION" != "${{ inputs.version }}" ]; then
            echo "Error: input version (${{ inputs.version }}) does not match package.json ($PKG_VERSION)"
            exit 1
          fi
          if echo "${{ inputs.version }}" | grep -qE '(SNAPSHOT|alpha|beta|rc)'; then
            echo "Error: pre-release versions are not allowed"
            exit 1
          fi
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: release version must be a stable semver version like 0.2.0"
            exit 1
          fi

      - name: Install dependencies
        working-directory: memind-clients/typescript
        run: pnpm install --frozen-lockfile

      - name: Format check
        working-directory: memind-clients/typescript
        run: pnpm format:check

      - name: Lint
        working-directory: memind-clients/typescript
        run: pnpm lint

      - name: Type check
        working-directory: memind-clients/typescript
        run: pnpm typecheck

      - name: Test
        working-directory: memind-clients/typescript
        run: pnpm test:coverage

      - name: Build
        working-directory: memind-clients/typescript
        run: pnpm build

      - name: Pack check
        working-directory: memind-clients/typescript
        run: pnpm pack --json --pack-destination .pack-check

      - name: Publish
        working-directory: memind-clients/typescript
        run: npm publish --access public --provenance
