name: Assign New Issues and Pull Requests

on:
  issues:
    types:
      - opened
      - reopened
  pull_request_target:
    types:
      - opened
      - reopened
      - ready_for_review

permissions:
  issues: write
  pull-requests: write

jobs:
  assign:
    name: Assign to default maintainer
    runs-on: ubuntu-latest

    steps:
      - name: Assign issue or pull request
        uses: actions/github-script@v7
        with:
          script: |
            const assignee = 'starboyate';
            const issueNumber = context.payload.issue?.number ?? context.payload.pull_request?.number;

            if (!issueNumber) {
              core.setFailed('Unable to resolve issue or pull request number.');
              return;
            }

            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              assignees: [assignee],
            });
