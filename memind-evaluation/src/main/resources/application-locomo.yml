evaluation:
  active-dataset: locomo
  datasets:
    locomo:
      path: ./memind-evaluation/data/locomo/locomo10.json
      source-format: locomo
      loader-format: locomo
      filter-categories: [5]
      search:
        query-mode: raw-question
      judge:
        strategy: llm_judge
  system:
    search:
      dual-perspective: true
    memind:
      enable-insight: false
