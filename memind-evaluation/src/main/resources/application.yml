spring:
  application:
    name: memind-evaluation
  profiles:
    default: locomo
  ai:
    openai:
      base-url: ${OPENAI_BASE_URL:https://openrouter.ai/api}
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: ${OPENAI_CHAT_MODEL:openai/gpt-4o-mini}
      embedding:
        base-url: ${EMBEDDING_BASE_URL:https://openrouter.ai/api}
        api-key: ${EMBEDDING_API_KEY:}
        options:
          model: ${OPENAI_EMBEDDING_MODEL:openai/text-embedding-3-small}

memind:
  vector:
    store-path: ./eval-data/memind-eval-vectors.json
  store:
    init-schema: true

logging:
  file:
    name: ./eval-data/logs/memind-eval.log
  level:
    root: WARN
    com.openmemind.ai.memory: INFO
    com.openmemind.ai.memory.evaluation.pipeline: INFO
    com.openmemind.ai.memory.evaluation.progress: INFO
    reactor.netty.http.client: ERROR
    org.springframework.ai.retry: WARN
    io.micrometer: WARN

evaluation:
  auto-run: true
  output-dir: ./eval-data/results
  run-name: default-01
  stages: add,search,answer,evaluate
  from-conv: 0
  to-conv: -1
  smoke: false
  clean-groups: false
  concurrency:
    add: 10       # conversations processed in parallel during ADD stage
    search: 10   # QA questions processed in parallel during SEARCH stage
    conv: 20      # conversations processed in parallel during SEARCH stage
    answer: 20    # QA questions processed in parallel during ANSWER stage
    evaluate: 10  # QA questions processed in parallel during EVALUATE stage
  system:
    search:
      top-k: 20
    memind:
      add-mode: chunk
      storage:
        sqlite:
          path: ./eval-data/memind-eval.db
      extraction:
        boundary:
          max-messages: 30
      retrieval:
        mode: simple
        timeout: 5m
        rerank:
          enabled: true
          base-url: ${RERANK_BASE_URL:https://aihubmix.com}
          api-key: ${RERANK_API_KEY:}
          model: ${RERANK_MODEL:jina-reranker-v3}
          blend-with-retrieval: true
    answer:
      max-retries: 3
    llm:
      eval-model: openai/gpt-4o-mini
      num-runs: 3
